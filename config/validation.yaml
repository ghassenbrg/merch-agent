listing_field_constraints:
  design_title:
    min: 3
    max: 60
  brand:
    min: 3
    max: 50
  feature_bullet_1:
    min: 10
    max: 256
  feature_bullet_2:
    min: 10
    max: 256
  product_description:
    min: 80
    max: 2000

translation_required_locales:
  - de
  - fr
  - it
  - es
  - ja
