ready_for_amazon_draft:
  png_valid: true
  transparent_background: true
  correct_resolution: true
  file_size_under_limit: true
  placement_metadata_valid: true
  design_not_too_small: true
  design_not_cropped: true
  trademark_precheck: "pass"
  amazon_policy_precheck: "pass"
  human_review_required: false
  compliance_blocked: false
  product_type_terms_removed: true
  listing_min_lengths_passed: true
  selected_marketplaces_have_copy: true
  listing_field_lengths_passed: true
  listing_punctuation_passed: true
  marketplace_language_copy_passed: true
  translation_checks_passed: true
  price_config_exists: true

artwork:
  max_file_size_mb: 25
  transparent_alpha_threshold: 0
  min_design_width_ratio: 0.25
  min_design_height_ratio: 0.25
  min_design_area_ratio: 0.08
  min_edge_margin_px: 20
  allowed_placements:
    - large_front

